# ──────────────────────────────────────────────────────────────
# Packman-Edu  —  Nginx virtual-host configuration
# Domain : packman-edu.example.com   (replace with real domain)
# Root   : /var/www/packman-edu
# ──────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name packman-edu.example.com;

    # Certbot ACME challenge must remain accessible over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/packman-edu;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server block ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name packman-edu.example.com;

    # ── SSL (Let's Encrypt standard paths) ────────────────────
    ssl_certificate     /etc/letsencrypt/live/packman-edu.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/packman-edu.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Document root ─────────────────────────────────────────
    root /var/www/packman-edu;
    index index.html;

    # ── Security headers (shared include) ─────────────────────
    include /etc/nginx/snippets/headers.conf;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        application/wasm;

    # ── Default location ──────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Static assets (JS, CSS, images, fonts) — 30-day cache ─
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── WebAssembly modules — 90-day cache ────────────────────
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        expires 90d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── /game/ — prevent click-jacking via framing ────────────
    location /game/ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Custom error pages (optional) ─────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
