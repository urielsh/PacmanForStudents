<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacman - C++/SDL2 (WebAssembly)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #FFD700;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #FFD700, 0 0 20px #FFA500;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        #canvas-container {
            position: relative;
            border: 2px solid #333;
            border-radius: 4px;
            background-color: #111;
        }

        canvas.emscripten {
            display: block;
            outline: none;
        }

        /* Loading overlay */
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.92);
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #333;
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-text {
            font-size: 0.95rem;
            color: #FFD700;
        }

        #progress-bar-container {
            width: 200px;
            height: 6px;
            background: #222;
            border-radius: 3px;
            margin-top: 0.75rem;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            border-radius: 3px;
            transition: width 0.2s ease;
        }

        .controls {
            margin-top: 1.2rem;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
            line-height: 1.6;
        }

        .controls kbd {
            background: #222;
            border: 1px solid #444;
            border-radius: 3px;
            padding: 2px 6px;
            color: #FFD700;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <h1>Pacman</h1>
    <p class="subtitle">C++ / SDL2 / WebAssembly</p>

    <div id="canvas-container">
        <canvas class="emscripten" id="canvas"
                oncontextmenu="event.preventDefault()"
                tabindex="-1"></canvas>

        <div id="loading">
            <div class="spinner"></div>
            <div id="loading-text">Loading WASM module...</div>
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>&larr;</kbd> <kbd>&rarr;</kbd> Move
        &nbsp;&middot;&nbsp;
        <kbd>Esc</kbd> Quit
    </div>

    <script>
        // Emscripten Module configuration — must be set before the generated JS loads.
        var Module = {
            canvas: (function() {
                var c = document.getElementById('canvas');
                // Focus the canvas so keyboard input works immediately
                c.addEventListener('click', function() { c.focus(); });
                return c;
            })(),

            // Called by Emscripten to report download progress
            setStatus: function(text) {
                var loadingText = document.getElementById('loading-text');
                var progressBar = document.getElementById('progress-bar');
                if (!text) {
                    // Empty string = done loading
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('canvas').focus();
                    return;
                }
                loadingText.textContent = text;

                // Parse progress from status text like "Downloading data... (50/100)"
                var match = text.match(/(\d+(\.\d+)?)\/(\d+)/);
                if (match) {
                    var pct = (parseFloat(match[1]) / parseFloat(match[3])) * 100;
                    progressBar.style.width = pct + '%';
                }
            },

            // Hide loading overlay once the main loop starts
            onRuntimeInitialized: function() {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('canvas').focus();
            }
        };
    </script>

    {{{ SCRIPT }}}
</body>
</html>
